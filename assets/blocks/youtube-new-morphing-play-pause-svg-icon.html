<!DOCTYPE html>
<meta charset="utf-8">
<link rel="stylesheet" href="hidden.css">
<style>
.container {
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.button {
  flex: 1;
  padding: 0;
  height: 100%;
  border: 0;
  background-color: transparent;
  outline: none;
}

.button svg {
  width: 100%;
  height: 100%;
  display: block;
  fill: currentColor;
}
</style>
<body>
<div class="container">
  <button class="button js-button">
    <svg viewBox="0 0 36 36">
      <defs>
        <path id="pause-icon" data-state="playing" data-next-state="paused" d="M11,10 L17,10 L17,26 L11,26 M20,10 L26,10 L26,26 L20,26" />
        <path id="play-icon" data-state="paused" data-next-state="playing" d="M11,10 L18,13.74 L18,22.28 L11,26 M18,13.74 L26,18 L26,18 L18,22.28" />
      </defs>
      <use xlink:href="#play-icon" />
    </svg>
  </button>
</div>

<script src="https://unpkg.com/d3-interpolate-path@2.3.0/build/d3-interpolate-path.js" integrity="sha512-/KgDI+uHyEILdOip4a2TTY6ErNAg/jJtTZ67hG450/jvgrZFKm9YkF/Q+mAIs6y7VTG+ODbACY4V4Dj4wM6SUg==" crossorigin></script>
<script type="text/javascript">
"use strict";

class PlayPauseButton {
  constructor(el) {
    this.el = el;
    this.replaceUseWithPath();
    this.transition = new Transition(400, this.tick);
    this.el.addEventListener("click", this.goToNextState);
  }

  replaceUseWithPath() {
    var useEl = this.el.querySelector("use");
    var iconId = useEl.getAttribute("xlink:href");
    var iconEl = this.el.querySelector(iconId);
    var iconPath = iconEl.getAttribute("d");

    this.nextState = iconEl.getAttribute("data-next-state");
    this.pathEl = document.createElementNS("http://www.w3.org/2000/svg", "path");
    this.pathEl.setAttribute("d", iconPath);

    useEl.parentNode.replaceChild(this.pathEl, useEl);
  }

  goToNextState = () => {
    var nextIconEl = this.el.querySelector(`[data-state="${this.nextState}"]`);
    var nextIconPath = nextIconEl.getAttribute("d");
    var iconPath = this.pathEl.getAttribute("d");

    this.nextState = nextIconEl.getAttribute("data-next-state");
    this.pathInterpolator = d3.interpolatePath(iconPath, nextIconPath);
    this.transition.start();
  }

  tick = (progress) => {
    this.pathEl.setAttribute("d", this.pathInterpolator(progress));
  }
}

// The following code doesn't really matter, it's just a simplification of what D3 does.
class Transition {
  constructor(duration, cb, easeFn = easeInOutCubic) {
    this.duration = duration;
    this.cb = cb;
    this.easeFn = easeFn;
  }

  start() {
    this.startTimestamp = performance.now();
    if (!this.isRunning) {
      this.isRunning = true;
      requestAnimationFrame(this.tick);
    }
  }

  tick = (timestamp) => {
    var timeElapsed = timestamp - this.startTimestamp;
    var from = 0;
    var to = 1;

    this.progress = clamp(this.easeFn(timeElapsed, from, to, this.duration));
    this.cb(this.progress);
    if (timeElapsed < this.duration) {
      requestAnimationFrame(this.tick);
    } else {
      this.isRunning = false;
    }
  }
}

// taken from https://github.com/chenglou/tween-functions/blob/master/index.js
// t: current time, b: beginning value, _c: final value, d: total duration
function easeInOutCubic(t, b, _c, d) {
  var c = _c - b;
  if ((t /= d / 2) < 1) {
    return c / 2 * t * t * t + b;
  } else {
    return c / 2 * ((t -= 2) * t * t + 2) + b;
  }
}

function clamp(val) {
  return Math.max(Math.min(val, 1), 0);
}

var playPauseButton = new PlayPauseButton(document.querySelector(".js-button"));
</script>
</body>
