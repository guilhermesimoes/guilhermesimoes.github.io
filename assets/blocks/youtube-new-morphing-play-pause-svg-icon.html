<!DOCTYPE html>
<meta charset="utf-8">
<style>
html, body {
  height: 100%;
  margin: 0;
  -webkit-user-select: none;
  user-select: none;
}

.container {
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.button {
  flex: 1;
  padding: 0;
  height: 100%;
  border: 0;
  background-color: white;
  outline: none;
  -webkit-tap-highlight-color: transparent;
}

.button svg {
  width: 100%;
  height: 100%;
  display: block;
}
</style>
<body>
<div class="container">
  <button class="button js-button">
    <svg viewBox="0 0 36 36">
      <defs>
        <path id="pause-icon" data-state="playing" data-next-state="paused" d="M11,10 L17,10 L17,26 L11,26 M20,10 L26,10 L26,26 L20,26" />
        <path id="play-icon" data-state="paused" data-next-state="playing" d="M11,10 L18,13.74 L18,22.28 L11,26 M18,13.74 L26,18 L26,18 L18,22.28" />
      </defs>
      <use xlink:href="#play-icon" />
    </svg>
  </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3-ease@3.0.1/dist/d3-ease.min.js" integrity="sha256-5goe11ChrRON0Y6NP0YyOBE8+/fYloWhPRm9TgSNw84=" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/d3-timer@3.0.1/dist/d3-timer.min.js" integrity="sha256-kRztowXwFLa1PKaNXIlqmjh9oSDP1WpCGixgzKL8mzY=" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/d3-interpolate@3.0.1/dist/d3-interpolate.min.js" integrity="sha256-v8Mh5MPzs6rciM/hXMteRDq/6t74t1xltBwzpNeKmK4=" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/d3-dispatch@3.0.1/dist/d3-dispatch.min.js" integrity="sha256-lLO722uY3BMloVdisFEBPoJTmZsOBDayfR2he5UroK8=" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/d3-selection@3.0.0/dist/d3-selection.min.js" integrity="sha256-RdqrnPZ3kBvK4QLz8jyikw2zwPuP+ePb7Qh9nE3pIco=" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/d3-transition@3.0.1/dist/d3-transition.min.js" integrity="sha256-wkjZf2wTGvf0oSo/8fLtg/HMbA4X/HZKGYtu5FLmYhs=" crossorigin></script>
<script type="text/javascript">
"use strict";

class PlayPauseButton {
  constructor(el) {
    this.el = el;
    this.replaceUseWithPath();
    this.el.addEventListener("click", this.goToNextState.bind(this));
    this.animationDuration = 400;
  }

  replaceUseWithPath() {
    var useEl = this.el.querySelector("use");
    var iconId = useEl.getAttribute("xlink:href");
    var iconEl = this.el.querySelector(iconId);
    var nextState = iconEl.getAttribute("data-next-state");
    var iconPath = iconEl.getAttribute("d");

    this.pathEl = document.createElementNS("http://www.w3.org/2000/svg", "path");
    this.pathEl.setAttribute("data-next-state", nextState);
    this.pathEl.setAttribute("d", iconPath);

    var svgEl = this.el.querySelector("svg");
    svgEl.replaceChild(this.pathEl, useEl);
  }

  goToNextState() {
    var nextIconEl = this.getNextIcon();
    var nextIconPath = nextIconEl.getAttribute("d");
    var nextState = nextIconEl.getAttribute("data-next-state");

    d3.select(this.pathEl)
      .attr("data-next-state", nextState)
      .transition()
        .duration(this.animationDuration)
        .attr("d", nextIconPath);
  }

  getNextIcon() {
    var nextState = this.pathEl.getAttribute("data-next-state");
    return this.el.querySelector(`[data-state="${nextState}"]`);
  }
};

var playPauseButton = new PlayPauseButton(document.querySelector(".js-button"));

self.d3.color = () => {}; // This should not be necessary but it is
</script>
</body>
