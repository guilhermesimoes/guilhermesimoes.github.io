<!DOCTYPE html>
<meta charset="utf-8">
<link rel="stylesheet" href="hidden.css">
<style>
.chart {
  width: 100%;
  height: 100%;
  display: block;
}

.chart .link {
  fill: none;
  stroke: #999;
  stroke-width: 1.5px;
}

.chart .node text {
  font-size: 12px;
}
</style>
<body>

<svg class="chart js-chart"></svg>

<script src="https://d3js.org/d3.v5.min.js"></script>
<script>
"use strict";

var data = {
  name: "CSP",
  children: [
    {
      name: "Fetch directives",
      children: [
        { name: "default-src" },
        { name: "script-src" },
        { name: "style-src" },
        { name: "img-src" },
        { name: "font-src" },
        { name: "connect-src" },
        { name: "media-src" },
        { name: "object-src" },
        { name: "frame-src" },
        { name: "child-src" },
        { name: "worker-src" },
        { name: "manifest-src" }
      ]
    },
    {
      name: "Document directives",
      children: [
        { name: "base-uri" },
        { name: "sandbox" }
      ]
    },
    {
      name: "Navigation directives",
      children: [
        { name: "form-action" },
        { name: "frame-ancestors" }
      ]
    },
    {
      name: "Reporting directives",
      children: [
        { name: "report-uri" },
        { name: "report-to" }
      ]
    }
  ]
};

var width = 900;
var height = 500;
var margin = { top: 20, right: 120, bottom: 20, left: 80 };

var svg = d3.select(".js-chart")
  .attr("viewBox", "0 0 " + width + " " + height);

var g = svg.append("g")
  .attr("transform", "translate(" + margin.left + "," + margin.top + ")");

var treeWidth = width - margin.left - margin.right;
var treeHeight = height - margin.top - margin.bottom;

var treeLayout = d3.tree()
  .size([treeHeight, treeWidth]);

var root = d3.hierarchy(data);
treeLayout(root);

g.selectAll(".link")
  .data(root.links())
  .enter().append("path")
    .attr("class", "link")
    .attr("d", d3.linkHorizontal()
      .x(function (d) { return d.y; })
      .y(function (d) { return d.x; }));

var node = g.selectAll(".node")
  .data(root.descendants())
  .enter().append("g")
    .attr("class", "node")
    .attr("transform", function (d) {
      return "translate(" + d.y + "," + d.x + ")";
    });

node.append("circle")
  .attr("r", 4)
  .attr("fill", function (d) {
    return d.children ? "#555" : "#999";
  });

node.append("text")
  .attr("dy", "0.31em")
  .attr("x", function (d) { return d.children ? -8 : 8; })
  .attr("text-anchor", function (d) {
    return d.children ? "end" : "start";
  })
  .text(function (d) { return d.data.name; });
</script>
</body>
