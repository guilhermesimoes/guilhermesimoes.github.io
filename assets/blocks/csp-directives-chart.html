<!DOCTYPE html>
<meta charset="utf-8">
<link rel="stylesheet" href="hidden.css">
<style>
.chart {
  width: 100%;
  height: 100%;
  display: block;
}

.chart .link {
  fill: none;
  stroke: gray;
  stroke-width: 1.5px;
}

.chart .node text {
  font-size: 12px;
  fill: currentColor;
}
</style>
<body>

<svg class="chart js-chart"></svg>

<script src="https://d3js.org/d3.v5.min.js"></script>
<script>
"use strict";

var data = {
  name: "CSP Fetch directives",
  href: "https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Headers/Content-Security-Policy#fetch_directives",
  children: [
    { name: "default-src", children: [
      { name: "connect-src", children: [
        { name: "`Navigator.sendBeacon()`", href: "https://developer.mozilla.org/en-US/docs/Web/API/Navigator/sendBeacon" },
        { name: "`EventSource`", href: "https://developer.mozilla.org/en-US/docs/Web/API/EventSource" },
        { name: "`WebSocket`", href: "https://developer.mozilla.org/en-US/docs/Web/API/WebSocket" },
        { name: "`<a>` + `ping` attr", href: "https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/a#ping" },
        { name: "`XMLHttpRequest`", href: "https://developer.mozilla.org/en-US/docs/Web/API/XMLHttpRequest" },
        { name: "`fetch()`", href: "https://developer.mozilla.org/en-US/docs/Web/API/Window/fetch" },
      ]},
      { name: "font-src", children: [
        { name: "`@font-face`", href: "https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/At-rules/@font-face" }
      ]},
      { name: "media-src", children: [
        { name: "`<audio>`", href: "https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/audio" },
        { name: "`<video>`", href: "https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/video" }
      ]},
      { name: "object-src", children: [
        { name: "`<object>`", href: "https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/object" },
        { name: "`<embed>`", href: "https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/embed" },
      ]},
      { name: "img-src", children: [
        { name: "`<img>`", href: "https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/img" },
        { name: "<link rel='icon'>", href: "https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Attributes/rel#icon" }
      ]},
      { name: "manifest-src", children: [
        { name: "`<link rel='manifest'>`", href: "https://developer.mozilla.org/en-US/docs/Web/Progressive_web_apps/Manifest" }
      ]},
      { name: "style-src", children: [
        { name: "`<link rel='stylesheet'>`", href: "https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/style" },
        { name: "`<style>`", href: "https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/style" },
        { name: "`@import`", href: "https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/At-rules/@import" },
      ]},
      { name: "child-src", children: [
        { name: "frame-src", children: [
          { name: "`<iframe>`", href: "https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/iframe" },
        ]},
      ]},
      { name: "script-src", children: [
        { name: "child-src", children: [
          { name: "`<script>`", href: "https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/script" },
          { name: "`onclick` attr", href: "https://developer.mozilla.org/en-US/docs/Web/API/Document_Object_Model/Events#using_onevent_properties" },
          { name: "worker-src", children: [
            { name: "ServiceWorker", href: "https://developer.mozilla.org/en-US/docs/Web/API/ServiceWorker" },
            { name: "SharedWorker", href: "https://developer.mozilla.org/en-US/docs/Web/API/SharedWorker" },
            { name: "Worker", href: "https://developer.mozilla.org/en-US/docs/Web/API/Worker" },
          ]},
        ]}
      ]},
    ]}
  ]
};

var width = 900;
var height = 500;
var margin = { top: 100, right: 20, bottom: 30, left: 0 };

var svg = d3.select(".js-chart")
  .attr("viewBox", "0 0 " + width + " " + height);

svg.append("defs").append("marker")
  .attr("id", "arrow")
  .attr("viewBox", "0 0 10 10")
  .attr("refX", 10)
  .attr("refY", 5)
  .attr("markerWidth", 6)
  .attr("markerHeight", 6)
  .attr("orient", "auto")
  .append("path")
    .attr("d", "M0,0 L10,5 L0,10 Z")
    .attr("fill", "#999");

var g = svg.append("g")
  .attr("transform", "translate(" + margin.left + "," + margin.top + ")");

var treeWidth = width - margin.left - margin.right;
var treeHeight = height - margin.top - margin.bottom;

var treeLayout = d3.cluster()
  .size([treeWidth, treeHeight]);

var root = d3.hierarchy(data);
treeLayout(root);

g.selectAll(".link")
  .data(root.links())
  .enter().append("path")
    .attr("class", "link")
    .attr("marker-end", "url(#arrow)")
    .attr("d", d3.linkVertical()
      .source(function (d) { return d.target; })
      .target(function (d) { return d.source; })
      .x(function (d) { return d.x; })
      .y(function (d) { return treeHeight - d.y; }));

var node = g.selectAll(".node")
  .data(root.descendants())
  .enter().append("g")
    .attr("class", "node")
    .attr("transform", function (d) {
      return "translate(" + d.x + "," + (treeHeight - d.y) + ")";
    });

node.append("circle")
  .attr("r", 4)
  .attr("fill", function (d) {
    return d.children ? "#555" : "#999";
  });

var baseHref = "https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Headers/Content-Security-Policy/";

node.append("a")
  .attr("href", function (d) { return d.data.href || (baseHref + d.data.name); })
  .append("text")
  .attr("dy", function (d) { return d.children ? "1.3em" : "-0.6em"; })
  .attr("dx", function (d) { return d.children ? 0 : 0; })
  .attr("text-anchor", function (d) { return d.children ? "middle" : "start"; })
  .attr("transform", function (d) { return d.children ? null : "rotate(-40)"; })
  .text(function (d) { return d.data.name; });
</script>
</body>
