<!DOCTYPE html>
<meta charset="utf-8">
<link rel="stylesheet" href="hidden.css">
<style>
.chart {
  width: 100%;
  height: 100%;
  display: block;
}

.chart .link {
  fill: none;
  stroke: currentColor;
  stroke-width: 1.5px;
}

.chart .node text {
  font-size: 12px;
  stroke: currentColor;
}
</style>
<body>

<svg class="chart js-chart"></svg>

<script src="https://d3js.org/d3.v5.min.js"></script>
<script>
"use strict";

var data = {
  name: "CSP",
  children: [
    { name: "Fetch directives", children: [
      { name: "default-src", children: [
        { name: "img-src", children: [
          { name: "`<img>`" },
          { name: "favicon" }
        ]},
        { name: "media-src", children: [
          { name: "`<audio>`" },
          { name: "`<video>`" }
        ]},
        { name: "font-src", children: [{ name: "`@font-face`"}] },
        { name: "connect-src", children: [
          { name: "`<a>` + `ping` attr" },
          { name: "`fetch()`" },
          { name: "`XMLHttpRequest`" },
          { name: "`WebSocket`" },
          { name: "`EventSource`" },
          { name: "`Navigator.sendBeacon()`" },
        ]},
        { name: "object-src", children: [
          { name: "`<object>`" },
          { name: "`<embed>`" },
        ]},
        { name: "manifest-src", children: [
          { name: "`<link rel=manifest>`" }
        ]},
        { name: "script-src", children: [
          { name: "`<script>`" },
          { name: "`onclick` attr" },
          { name: "child-src", children: [
            { name: "worker-src", children: [
              { name: "ServiceWorker" },
              { name: "Worker" },
              { name: "SharedWorker" }
            ]},
          ]}
        ]},
        { name: "child-src", children: [
          { name: "frame-src", children: [
            { name: "`<iframe>`" },
          ]},
        ]},
        { name: "style-src", children: [
          { name: "`<link rel=stylesheet>`" },
          { name: " `@import`" },
        ]},
      ]}
    ]}
  ]
};

var width = 900;
var height = 500;
var margin = { top: 40, right: 20, bottom: 120, left: 20 };

var svg = d3.select(".js-chart")
  .attr("viewBox", "0 0 " + width + " " + height);

var g = svg.append("g")
  .attr("transform", "translate(" + margin.left + "," + margin.top + ")");

var treeWidth = width - margin.left - margin.right;
var treeHeight = height - margin.top - margin.bottom;

var treeLayout = d3.tree()
  .size([treeWidth, treeHeight]);

var root = d3.hierarchy(data);
treeLayout(root);

g.selectAll(".link")
  .data(root.links())
  .enter().append("path")
    .attr("class", "link")
    .attr("d", d3.linkVertical()
      .x(function (d) { return d.x; })
      .y(function (d) { return d.y; }));

var node = g.selectAll(".node")
  .data(root.descendants())
  .enter().append("g")
    .attr("class", "node")
    .attr("transform", function (d) {
      return "translate(" + d.x + "," + d.y + ")";
    });

node.append("circle")
  .attr("r", 4)
  .attr("fill", function (d) {
    return d.children ? "#555" : "#999";
  });

node.append("text")
  .attr("dy", function (d) { return d.children ? "-0.7em" : "1.2em"; })
  .attr("text-anchor", "middle")
  .text(function (d) { return d.data.name; });
</script>
</body>
