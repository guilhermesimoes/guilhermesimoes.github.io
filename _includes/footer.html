<script>
  if (navigator.serviceWorker) {
    navigator.serviceWorker.register('/service-worker.js');
  }

  self.addEventListener('pageswap', () => {
    var menuTrigger = document.querySelector('#nav-trigger');
    if (menuTrigger.checked) {
      menuTrigger.checked = false;
    }
  });

  var deviceIsLargeish = matchMedia('(hover: hover)').matches;
  var pageIsScrollable = document.body.scrollHeight > self.innerHeight;
  if (deviceIsLargeish && pageIsScrollable) {
    var hidingButton = true;
    var goTopButton = document.querySelector('#gotop-link');
    self.addEventListener('scroll', handleScroll);
  }

  function handleScroll() {
    var scrollPercentage = (self.scrollY + self.innerHeight) / document.body.scrollHeight;
    if (scrollPercentage > 0.5) {
      if (hidingButton) {
        hidingButton = false;
        goTopButton.classList.remove('hidden');
      }
    } else {
      if (!hidingButton) {
        hidingButton = true;
        goTopButton.classList.add('hidden');
      }
    }
  }
</script>
