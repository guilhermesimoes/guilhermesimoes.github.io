---
layout:       default
title:        A blog by Guilherme Simões
permalink:    /blog/
---

<section itemscope itemtype="https://schema.org/ItemList" class="blog-index wrapper">
  <h1 itemprop="name">Blog</h1>

  <table>
    <tbody>
      {% for post in site.posts %}
        {%- if post.hidden != true -%}
          <tr itemprop="itemListElement">
            <td class="deemph">{%- include date.html date=post.date -%}</td>
            <td><a href="{{ post.url | relative_url }}" itemprop="name">{{ post.title | strip_html }}</a></td>
          </tr>
        {%- endif %}
      {% endfor %}
    </tbody>
  </table>

  {%- include rss-hint.html -%}
</section>
